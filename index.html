<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="theme-color" content="#dfe4e7">
  <title>螺旋测微器交互模拟器</title>
  <style>
:root {
  color-scheme: light;
  --ink: #172126;
  --muted: #667278;
  --line: #c8d0d4;
  --panel: rgba(249, 250, 250, .9);
  --accent: #a91f2b;
  --accent-dark: #76141c;
  --green: #237a50;
  --red: #b52d35;
  --shadow: 0 18px 45px rgba(30, 42, 48, .13);
}

* {
  box-sizing: border-box;
}

html {
  min-width: 320px;
  background: #dce1e3;
}

body {
  margin: 0;
  min-height: 100vh;
  overflow-x: hidden;
  color: var(--ink);
  font-family: "Noto Sans SC", "Microsoft YaHei", "PingFang SC", system-ui, sans-serif;
  background:
    linear-gradient(rgba(255,255,255,.42) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,.3) 1px, transparent 1px),
    radial-gradient(circle at 16% 5%, rgba(255,255,255,.92), transparent 34%),
    linear-gradient(145deg, #eef1f2 0%, #d8dde0 53%, #e8ebec 100%);
  background-size: 32px 32px, 32px 32px, auto, auto;
}

button,
input {
  font: inherit;
}

button {
  -webkit-tap-highlight-color: transparent;
}

.app-shell {
  width: min(1180px, calc(100% - 36px));
  margin: 0 auto;
  padding: 34px 0 28px;
}

.hero {
  display: flex;
  align-items: center;
  gap: 18px;
  padding: 0 6px 24px;
}

.hero-mark {
  display: grid;
  place-items: center;
  width: 70px;
  height: 70px;
  flex: 0 0 auto;
  border: 1px solid #8e999e;
  border-radius: 17px;
  color: #f4f6f7;
  font: 700 42px/1 Georgia, serif;
  text-shadow: 0 2px 2px #1d2529;
  background: linear-gradient(145deg, #747e83, #283237 55%, #657075);
  box-shadow: inset 0 1px 1px #d9dfe1, 0 9px 18px rgba(24, 34, 39, .22);
}

.eyebrow,
.section-kicker {
  margin: 0 0 5px;
  color: var(--accent);
  font-size: 11px;
  font-weight: 800;
  letter-spacing: .2em;
}

h1,
h2,
p {
  margin-top: 0;
}

h1 {
  margin-bottom: 3px;
  font-family: Georgia, "Noto Serif SC", serif;
  font-size: clamp(27px, 4vw, 42px);
  line-height: 1.12;
  letter-spacing: .02em;
}

.subtitle {
  margin-bottom: 0;
  color: var(--muted);
  font-size: 15px;
  letter-spacing: .16em;
}

.instrument-card,
.panel,
.feedback-panel,
.analysis-panel {
  border: 1px solid rgba(115, 128, 134, .33);
  border-radius: 18px;
  background: var(--panel);
  box-shadow: var(--shadow), inset 0 1px 0 #fff;
  -webkit-backdrop-filter: blur(8px);
  backdrop-filter: blur(8px);
}

.instrument-card {
  padding: 24px;
  overflow: hidden;
}

.section-heading,
.panel-title {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 20px;
}

.section-heading h2,
.panel-title h2 {
  margin: 0;
  font-size: 19px;
}

.mode-badge {
  flex: 0 0 auto;
  padding: 7px 12px;
  border: 1px solid #9da8ad;
  border-radius: 99px;
  color: #4e5b61;
  background: linear-gradient(#fff, #e4e8ea);
  font-size: 12px;
  font-weight: 700;
}

.mode-badge.quiz {
  border-color: #b88d91;
  color: var(--accent-dark);
  background: #f8e9eb;
}

.instrument-stage {
  position: relative;
  margin-top: 12px;
  border: 1px solid #b9c2c6;
  border-radius: 14px;
  overflow: hidden;
  outline: none;
  cursor: ew-resize;
  -ms-touch-action: none;
  touch-action: none;
  -webkit-user-select: none;
  user-select: none;
  background:
    radial-gradient(circle at 50% 0, #fff, transparent 45%),
    linear-gradient(180deg, #edf0f1, #d6dcde);
  box-shadow: inset 0 2px 12px rgba(47, 60, 66, .1);
}

.instrument-stage:focus-visible {
  box-shadow: inset 0 2px 12px rgba(47, 60, 66, .1), 0 0 0 3px rgba(169, 31, 43, .2);
}

#micrometerSvg {
  display: block;
  width: 100%;
  height: auto;
  min-height: 250px;
}

.label-layer text {
  fill: #536067;
  font-size: 15px;
  font-weight: 700;
}

.label-layer .drag-hint {
  fill: #69757b;
  font-size: 13px;
  font-weight: 600;
  letter-spacing: .08em;
}

.live-strip {
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  align-items: center;
  gap: 16px;
  margin-top: 14px;
  padding: 13px 17px;
  border: 1px solid #aab4b8;
  border-radius: 10px;
  color: #e7ecee;
  background: linear-gradient(180deg, #3e494e, #1e272b);
  box-shadow: inset 0 1px 0 rgba(255,255,255,.18);
}

.live-label,
.step-label {
  color: #cbd2d5;
  font-size: 12px;
  letter-spacing: .08em;
}

.step-label {
  justify-self: end;
}

#liveReading {
  min-width: 148px;
  color: #fff;
  font: 700 24px/1.2 "SFMono-Regular", Consolas, monospace;
  text-align: center;
  letter-spacing: .03em;
}

#liveReading.concealed {
  color: #d1d7d9;
  letter-spacing: .1em;
}

.control-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 18px;
  margin-top: 18px;
}

.panel,
.analysis-panel {
  padding: 23px;
}

.panel-title {
  justify-content: flex-start;
  margin-bottom: 19px;
}

.panel-title p {
  margin-bottom: 2px;
  color: var(--muted);
  font-size: 11px;
  font-weight: 800;
  letter-spacing: .15em;
  text-transform: uppercase;
}

.number-tag {
  display: grid;
  place-items: center;
  width: 39px;
  height: 39px;
  flex: 0 0 auto;
  border-radius: 10px;
  color: #fff;
  font: 700 13px/1 Consolas, monospace;
  background: linear-gradient(145deg, #59656a, #273136);
  box-shadow: inset 0 1px 0 rgba(255,255,255,.28);
}

.button-row {
  display: flex;
  gap: 11px;
}

.btn {
  min-height: 44px;
  padding: 0 20px;
  border: 1px solid transparent;
  border-radius: 9px;
  cursor: pointer;
  font-weight: 750;
  transition: transform .16s ease, box-shadow .16s ease, background .16s ease;
}

.btn:hover {
  transform: translateY(-1px);
}

.btn:active {
  transform: translateY(1px);
}

.btn:focus-visible,
input:focus-visible {
  outline: 3px solid rgba(169, 31, 43, .2);
  outline-offset: 2px;
}

.btn-primary {
  color: #fff;
  border-color: #72141c;
  background: linear-gradient(180deg, #be3340, #921d28);
  box-shadow: 0 7px 14px rgba(137, 24, 34, .2), inset 0 1px 0 rgba(255,255,255,.25);
}

.btn-secondary,
.btn-ghost {
  border-color: #aab4b8;
  color: #354147;
  background: linear-gradient(#fff, #e4e8ea);
}

.btn-ghost {
  background: transparent;
}

.control-tip {
  margin: 13px 0 0;
  color: var(--muted);
  font-size: 12px;
}

.answer-input-wrap {
  display: flex;
  align-items: center;
  margin-bottom: 13px;
  border: 1px solid #9da8ad;
  border-radius: 9px;
  overflow: hidden;
  background: #fff;
  box-shadow: inset 0 2px 5px rgba(32, 43, 48, .08);
}

.answer-input-wrap:focus-within {
  border-color: var(--accent);
}

.answer-input-wrap input {
  min-width: 0;
  width: 100%;
  height: 49px;
  padding: 0 15px;
  border: 0;
  outline: 0;
  color: #172126;
  background: transparent;
  font: 700 20px/1 Consolas, monospace;
}

.answer-input-wrap span {
  padding: 0 16px;
  color: #59666c;
  font-weight: 700;
}

.feedback-panel {
  display: flex;
  align-items: center;
  gap: 15px;
  margin-top: 18px;
  padding: 17px 21px;
}

.feedback-panel[hidden],
.analysis-panel[hidden] {
  display: none;
}

.feedback-panel.correct {
  border-color: rgba(35, 122, 80, .42);
  background: rgba(232, 247, 239, .92);
}

.feedback-panel.wrong {
  border-color: rgba(181, 45, 53, .42);
  background: rgba(251, 235, 236, .94);
}

.feedback-icon {
  display: grid;
  place-items: center;
  width: 40px;
  height: 40px;
  flex: 0 0 auto;
  border-radius: 50%;
  color: #fff;
  background: var(--green);
  font-size: 21px;
  font-weight: 900;
}

.wrong .feedback-icon {
  background: var(--red);
}

.feedback-title {
  margin-bottom: 2px;
  font-weight: 850;
}

.feedback-text {
  margin-bottom: 0;
  color: #59666c;
  font-size: 13px;
}

.analysis-panel {
  margin-top: 18px;
}

.analysis-grid {
  display: grid;
  grid-template-columns: 1fr auto 1fr auto 1fr;
  align-items: center;
  gap: 14px;
}

.analysis-item {
  padding: 18px;
  border: 1px solid #bec7ca;
  border-radius: 11px;
  background: rgba(255,255,255,.62);
}

.analysis-item span {
  display: block;
  margin-bottom: 6px;
  color: var(--muted);
  font-size: 12px;
}

.analysis-item strong {
  font: 750 clamp(17px, 2.5vw, 23px)/1.2 Consolas, monospace;
}

.analysis-item.total {
  color: #fff;
  border-color: #313c41;
  background: linear-gradient(145deg, #4b575c, #20292d);
}

.analysis-item.total span {
  color: #cdd4d7;
}

.operator {
  color: #7b878c;
  font-size: 25px;
  font-weight: 300;
}

.formula {
  margin: 15px 0 0;
  padding-top: 14px;
  border-top: 1px solid #cbd2d5;
  color: #4d5a60;
  font-family: Consolas, monospace;
  text-align: center;
}

footer {
  display: flex;
  justify-content: space-between;
  gap: 20px;
  padding: 20px 5px 0;
  color: #68757b;
  font-size: 11px;
  letter-spacing: .08em;
}

@media (max-width: 760px) {
  .app-shell {
    width: min(100% - 20px, 620px);
    padding-top: 20px;
  }

  .hero {
    padding-bottom: 17px;
  }

  .hero-mark {
    width: 55px;
    height: 55px;
    border-radius: 14px;
    font-size: 34px;
  }

  .eyebrow {
    letter-spacing: .12em;
  }

  .instrument-card,
  .panel,
  .analysis-panel {
    padding: 16px;
  }

  .section-heading {
    align-items: flex-start;
  }

  .section-heading h2 {
    font-size: 16px;
  }

  #micrometerSvg {
    min-height: 205px;
  }

  .label-layer text:not(.drag-hint) {
    display: none;
  }

  .label-layer path {
    display: none;
  }

  .control-grid {
    grid-template-columns: 1fr;
    gap: 12px;
    margin-top: 12px;
  }

  .live-strip {
    grid-template-columns: 1fr auto;
  }

  .step-label {
    display: none;
  }

  .analysis-grid {
    grid-template-columns: 1fr;
    gap: 8px;
  }

  .operator {
    height: 17px;
    line-height: 13px;
    text-align: center;
  }

  footer {
    flex-direction: column;
    gap: 5px;
  }
}

@media (max-width: 430px) {
  h1 {
    font-size: 24px;
  }

  .subtitle {
    font-size: 13px;
  }

  .hero-mark {
    display: none;
  }

  .instrument-card {
    padding: 12px;
  }

  .mode-badge {
    padding: 5px 8px;
    font-size: 10px;
  }

  .instrument-stage {
    margin-top: 9px;
  }

  #micrometerSvg {
    min-height: 170px;
  }

  .live-strip {
    padding: 11px 12px;
  }

  #liveReading {
    min-width: auto;
    font-size: 20px;
  }

  .button-row {
    flex-wrap: wrap;
  }

  .btn {
    flex: 1 1 120px;
    padding: 0 14px;
  }
}

@media (prefers-reduced-motion: reduce) {
  *,
  *::before,
  *::after {
    scroll-behavior: auto !important;
    transition-duration: .01ms !important;
  }
}

</style>
</head>
<body>
  <main class="app-shell">
    <header class="hero">
      <div class="hero-mark" aria-hidden="true">μ</div>
      <div>
        <p class="eyebrow">PHYSICS LAB · 0.001 mm</p>
        <h1>螺旋测微器交互模拟器</h1>
        <p class="subtitle">高中物理读数练习</p>
      </div>
    </header>

    <section class="instrument-card" aria-labelledby="instrument-title">
      <div class="section-heading">
        <div>
          <p class="section-kicker">交互仪器</p>
          <h2 id="instrument-title">旋转微分筒，观察刻度变化</h2>
        </div>
        <div class="mode-badge" id="modeBadge">自由调节</div>
      </div>

      <div class="instrument-stage" id="instrumentStage" tabindex="0"
        aria-label="螺旋测微器模拟器，可拖动、滚动鼠标滚轮或按左右方向键调节">
        <svg id="micrometerSvg" viewBox="0 0 1000 420" role="img"
          aria-label="显示当前读数的螺旋测微器">
          <defs>
            <linearGradient id="metal" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0" stop-color="#f8fafb"/>
              <stop offset=".18" stop-color="#adb5ba"/>
              <stop offset=".48" stop-color="#f1f3f4"/>
              <stop offset=".7" stop-color="#8b9499"/>
              <stop offset="1" stop-color="#dfe3e5"/>
            </linearGradient>
            <linearGradient id="darkMetal" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0" stop-color="#778187"/>
              <stop offset=".45" stop-color="#2d363b"/>
              <stop offset=".7" stop-color="#6d777c"/>
              <stop offset="1" stop-color="#20282c"/>
            </linearGradient>
            <linearGradient id="sleeveMetal" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0" stop-color="#fafafa"/>
              <stop offset=".28" stop-color="#c7cccf"/>
              <stop offset=".52" stop-color="#fff"/>
              <stop offset=".75" stop-color="#a8b0b4"/>
              <stop offset="1" stop-color="#eceff0"/>
            </linearGradient>
            <linearGradient id="thimbleMetal" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0" stop-color="#d9dee0"/>
              <stop offset=".12" stop-color="#7d878c"/>
              <stop offset=".29" stop-color="#edf0f1"/>
              <stop offset=".53" stop-color="#969fa4"/>
              <stop offset=".72" stop-color="#f6f7f7"/>
              <stop offset="1" stop-color="#737d82"/>
            </linearGradient>
            <pattern id="knurl" width="14" height="14" patternUnits="userSpaceOnUse"
              patternTransform="rotate(45)">
              <rect width="14" height="14" fill="#7e888d"/>
              <rect width="4" height="14" fill="#c7ced1"/>
              <rect x="5" width="2" height="14" fill="#596267"/>
            </pattern>
            <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
              <feDropShadow dx="0" dy="12" stdDeviation="10" flood-color="#101619" flood-opacity=".28"/>
            </filter>
            <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
              <feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="#263238" flood-opacity=".25"/>
            </filter>
            <clipPath id="frameClip">
              <path d="M264 74 C123 68 61 141 64 224 C67 310 141 352 256 344
                L256 294 C176 301 125 279 119 224 C114 169 160 127 264 129 Z"/>
            </clipPath>
            <clipPath id="sleeveClip">
              <rect x="430" y="154" width="300" height="126" rx="7"/>
            </clipPath>
          </defs>

          <ellipse cx="502" cy="348" rx="414" ry="27" fill="#253036" opacity=".12"/>

          <g filter="url(#shadow)">
            <path d="M264 74 C123 68 61 141 64 224 C67 310 141 352 256 344
              L256 294 C176 301 125 279 119 224 C114 169 160 127 264 129 Z"
              fill="url(#darkMetal)" stroke="#1f272b" stroke-width="5"/>
            <g clip-path="url(#frameClip)" opacity=".25">
              <path d="M36 120 L305 300 M35 151 L289 331 M56 84 L308 255"
                stroke="#e8eef0" stroke-width="5"/>
              <path d="M85 75 L305 228 M53 185 L262 350"
                stroke="#101719" stroke-width="8"/>
            </g>
            <path d="M251 155 L302 155 L302 282 L251 282 Q236 218 251 155Z"
              fill="url(#metal)" stroke="#586267" stroke-width="4"/>
            <rect x="274" y="166" width="42" height="105" rx="6"
              fill="url(#metal)" stroke="#535d62" stroke-width="3"/>
            <rect id="spindle" x="316" y="191" width="124" height="55" rx="5"
              fill="url(#metal)" stroke="#5d676b" stroke-width="3"/>
            <rect x="302" y="184" width="20" height="70" rx="4"
              fill="#cbd0d2" stroke="#555f64" stroke-width="3"/>
          </g>

          <g id="movingAssembly" filter="url(#softShadow)">
            <rect x="430" y="154" width="300" height="126" rx="7"
              fill="url(#sleeveMetal)" stroke="#5c666b" stroke-width="4"/>
            <g id="mainScale" clip-path="url(#sleeveClip)"></g>
            <line x1="431" y1="218" x2="731" y2="218" stroke="#b4202a" stroke-width="4"/>
            <line x1="431" y1="222" x2="731" y2="222" stroke="#fff" stroke-opacity=".6"/>

            <g id="thimbleGroup">
              <path d="M650 146 L735 157 L735 278 L650 290 Q666 219 650 146Z"
                fill="url(#thimbleMetal)" stroke="#545f64" stroke-width="4"/>
              <rect x="724" y="137" width="153" height="162" rx="13"
                fill="url(#thimbleMetal)" stroke="#4f595e" stroke-width="4"/>
              <g id="thimbleStripes" opacity=".25"></g>
              <g id="thimbleScale"></g>
              <rect x="862" y="148" width="88" height="140" rx="12"
                fill="url(#knurl)" stroke="#4c565b" stroke-width="4"/>
              <rect x="935" y="165" width="32" height="106" rx="8"
                fill="url(#metal)" stroke="#4e585d" stroke-width="4"/>
              <line x1="728" y1="219" x2="872" y2="219" stroke="#b4202a" stroke-width="3"/>
            </g>
          </g>

          <g class="label-layer" aria-hidden="true">
            <path d="M151 83 L192 126" stroke="#59656a" stroke-width="2"/>
            <text x="80" y="70">弓架</text>
            <path d="M283 113 L286 158" stroke="#59656a" stroke-width="2"/>
            <text x="251" y="101">测砧</text>
            <path d="M363 157 L365 191" stroke="#59656a" stroke-width="2"/>
            <text x="322" y="145">测微螺杆</text>
            <path d="M526 117 L526 154" stroke="#59656a" stroke-width="2"/>
            <text x="489" y="105">固定尺</text>
            <path d="M760 110 L760 138" stroke="#59656a" stroke-width="2"/>
            <text x="720" y="98">微分筒</text>
            <path d="M907 113 L907 148" stroke="#59656a" stroke-width="2"/>
            <text x="887" y="101">旋钮</text>
            <text x="476" y="324" class="drag-hint">拖动微分筒 · 滚轮微调 · ← → 键调节</text>
          </g>
        </svg>
        <div class="drag-cursor" aria-hidden="true"></div>
      </div>

      <div class="live-strip">
        <span class="live-label">当前模拟读数</span>
        <strong id="liveReading" aria-live="polite">0.000 mm</strong>
        <span class="step-label">最小分度值 0.001 mm</span>
      </div>
    </section>

    <section class="control-grid" aria-label="操作与答题">
      <div class="panel control-panel">
        <div class="panel-title">
          <span class="number-tag">01</span>
          <div>
            <p>仪器控制</p>
            <h2>开始一次读数练习</h2>
          </div>
        </div>
        <div class="button-row">
          <button class="btn btn-primary" id="randomBtn" type="button">
            <span aria-hidden="true">✦</span> 随机出题
          </button>
          <button class="btn btn-secondary" id="resetBtn" type="button">重置</button>
        </div>
        <p class="control-tip" id="controlTip">自由调节时，当前读数会实时显示。</p>
      </div>

      <div class="panel answer-panel">
        <div class="panel-title">
          <span class="number-tag">02</span>
          <div>
            <p>填写读数</p>
            <h2>你的答案</h2>
          </div>
        </div>
        <label class="answer-input-wrap" for="answerInput">
          <input id="answerInput" type="number" inputmode="decimal" step="0.001"
            min="0" max="50" placeholder="例如 12.357" autocomplete="off">
          <span>mm</span>
        </label>
        <div class="button-row">
          <button class="btn btn-primary" id="submitBtn" type="button">提交答案</button>
          <button class="btn btn-ghost" id="explainBtn" type="button">显示解析</button>
        </div>
      </div>
    </section>

    <section class="feedback-panel" id="feedbackPanel" aria-live="polite" hidden>
      <div class="feedback-icon" id="feedbackIcon">✓</div>
      <div>
        <p class="feedback-title" id="feedbackTitle">回答正确！</p>
        <p class="feedback-text" id="feedbackText"></p>
      </div>
    </section>

    <section class="analysis-panel" id="analysisPanel" hidden>
      <div class="panel-title">
        <span class="number-tag">03</span>
        <div>
          <p>读数解析</p>
          <h2>分步读取刻度</h2>
        </div>
      </div>
      <div class="analysis-grid">
        <div class="analysis-item">
          <span>主尺读数</span>
          <strong id="mainReading">0.000 mm</strong>
        </div>
        <div class="operator">+</div>
        <div class="analysis-item">
          <span>微分筒读数</span>
          <strong id="thimbleReading">0.000 mm</strong>
        </div>
        <div class="operator">=</div>
        <div class="analysis-item total">
          <span>总读数</span>
          <strong id="totalReading">0.000 mm</strong>
        </div>
      </div>
      <p class="formula" id="formulaText">总读数 = 主尺读数 + 微分筒读数</p>
    </section>

    <footer>
      <span>高中物理实验 · 螺旋测微器</span>
      <span>量程 0–50 mm · 精度 0.001 mm</span>
    </footer>
  </main>

  <script>
"use strict";

const MIN_VALUE = 0;
const MAX_VALUE = 50000; // 以 0.001 mm 为一个整数单位，避免浮点累计误差
const DRAG_SENSITIVITY = 10;

const state = {
  valueUnits: 0,
  quizMode: false,
  answerRevealed: false,
  dragging: false,
  dragStartX: 0,
  dragStartUnits: 0
};

const elements = {
  stage: document.getElementById("instrumentStage"),
  mainScale: document.getElementById("mainScale"),
  thimbleScale: document.getElementById("thimbleScale"),
  thimbleStripes: document.getElementById("thimbleStripes"),
  thimbleGroup: document.getElementById("thimbleGroup"),
  spindle: document.getElementById("spindle"),
  liveReading: document.getElementById("liveReading"),
  modeBadge: document.getElementById("modeBadge"),
  controlTip: document.getElementById("controlTip"),
  randomBtn: document.getElementById("randomBtn"),
  resetBtn: document.getElementById("resetBtn"),
  answerInput: document.getElementById("answerInput"),
  submitBtn: document.getElementById("submitBtn"),
  explainBtn: document.getElementById("explainBtn"),
  feedbackPanel: document.getElementById("feedbackPanel"),
  feedbackIcon: document.getElementById("feedbackIcon"),
  feedbackTitle: document.getElementById("feedbackTitle"),
  feedbackText: document.getElementById("feedbackText"),
  analysisPanel: document.getElementById("analysisPanel"),
  mainReading: document.getElementById("mainReading"),
  thimbleReading: document.getElementById("thimbleReading"),
  totalReading: document.getElementById("totalReading"),
  formulaText: document.getElementById("formulaText")
};

const SVG_NS = "http://www.w3.org/2000/svg";

function createSvgElement(tag, attributes = {}, text = "") {
  const node = document.createElementNS(SVG_NS, tag);
  Object.keys(attributes).forEach(function (key) {
    node.setAttribute(key, attributes[key]);
  });
  if (text) node.textContent = text;
  return node;
}

function clearElement(node) {
  while (node.firstChild) {
    node.removeChild(node.firstChild);
  }
}

function formatUnits(units) {
  return (units / 1000).toFixed(3);
}

function clampUnits(units) {
  return Math.max(MIN_VALUE, Math.min(MAX_VALUE, Math.round(units)));
}

/**
 * 绘制固定尺刻度。每 1 mm 一条长刻线，每 0.5 mm 一条短刻线。
 * 为了在 50 mm 量程内保持可读性，只显示靠近微分筒边缘的局部刻度。
 */
function renderMainScale() {
  clearElement(elements.mainScale);
  const valueMm = state.valueUnits / 1000;
  const pixelsPerMm = 9.2;
  const edgeX = 655;

  for (let mark = 0; mark <= 100; mark += 1) {
    const markMm = mark * 0.5;
    const x = edgeX - (valueMm - markMm) * pixelsPerMm;
    if (x < 432 || x > 672) continue;

    const isWhole = mark % 2 === 0;
    const line = createSvgElement("line", {
      x1: x,
      y1: isWhole ? 218 : 220,
      x2: x,
      y2: isWhole ? 178 : 249,
      stroke: "#151a1d",
      "stroke-width": isWhole ? 2.2 : 1.7
    });
    elements.mainScale.appendChild(line);

    if (isWhole) {
      const label = createSvgElement("text", {
        x,
        y: 172,
        fill: "#151a1d",
        "font-size": "13",
        "font-family": "Consolas, monospace",
        "font-weight": "700",
        "text-anchor": "middle"
      }, String(markMm));
      elements.mainScale.appendChild(label);
    }
  }
}

/**
 * 微分筒一圈按 0.050 mm 处理，共 50 个刻格。
 * 屏幕上只绘制基准线附近的刻度，让数字随着读数上下滚动。
 */
function renderThimbleScale() {
  clearElement(elements.thimbleScale);
  clearElement(elements.thimbleStripes);

  const division = state.valueUnits % 50;
  const spacing = 7.1;
  const centerY = 219;

  for (let offset = -12; offset <= 12; offset += 1) {
    const raw = division + offset;
    const labelValue = ((raw % 50) + 50) % 50;
    const y = centerY + offset * spacing;
    const isMajor = labelValue % 5 === 0;

    elements.thimbleScale.appendChild(createSvgElement("line", {
      x1: isMajor ? 731 : 748,
      y1: y,
      x2: 776,
      y2: y,
      stroke: "#151a1d",
      "stroke-width": isMajor ? 2.4 : 1.3
    }));

    if (isMajor) {
      elements.thimbleScale.appendChild(createSvgElement("text", {
        x: 785,
        y: y + 5,
        fill: "#111719",
        "font-size": "14",
        "font-family": "Consolas, monospace",
        "font-weight": "700"
      }, labelValue < 10 ? `0${labelValue}` : String(labelValue)));
    }
  }

  const stripeOffset = (state.valueUnits % 24) * 2.2;
  for (let x = 705 - stripeOffset; x < 875; x += 26) {
    elements.thimbleStripes.appendChild(createSvgElement("line", {
      x1: x,
      y1: 140,
      x2: x + 42,
      y2: 298,
      stroke: "#ffffff",
      "stroke-width": "7"
    }));
    elements.thimbleStripes.appendChild(createSvgElement("line", {
      x1: x + 8,
      y1: 140,
      x2: x + 50,
      y2: 298,
      stroke: "#343e43",
      "stroke-width": "3"
    }));
  }
}

function getReadingParts() {
  const mainUnits = Math.floor(state.valueUnits / 1000) * 1000;
  return {
    mainUnits,
    thimbleUnits: state.valueUnits - mainUnits,
    totalUnits: state.valueUnits
  };
}

function renderReadout() {
  const shouldConceal = state.quizMode && !state.answerRevealed;
  elements.liveReading.textContent = shouldConceal ? "请读刻度" : `${formatUnits(state.valueUnits)} mm`;
  if (shouldConceal) {
    elements.liveReading.classList.add("concealed");
  } else {
    elements.liveReading.classList.remove("concealed");
  }
}

function renderInstrument() {
  renderMainScale();
  renderThimbleScale();
  renderReadout();

  const valueRatio = state.valueUnits / MAX_VALUE;
  const spindleWidth = 124 - valueRatio * 78;
  elements.spindle.setAttribute("width", Math.max(46, spindleWidth).toFixed(2));

  const subtleShift = (state.valueUnits % 50) / 50 * 1.7;
  elements.thimbleGroup.setAttribute("transform", `translate(${subtleShift.toFixed(2)} 0)`);
}

function clearResult() {
  elements.feedbackPanel.hidden = true;
  elements.analysisPanel.hidden = true;
  state.answerRevealed = false;
}

function setValue(units, options = {}) {
  state.valueUnits = clampUnits(units);
  if (options.userAdjusted && state.quizMode) {
    state.quizMode = false;
    elements.modeBadge.textContent = "自由调节";
    elements.modeBadge.classList.remove("quiz");
    elements.controlTip.textContent = "已进入自由调节模式，当前读数会实时显示。";
    clearResult();
  }
  renderInstrument();
}

function startQuiz() {
  state.valueUnits = Math.floor(Math.random() * (MAX_VALUE + 1));
  state.quizMode = true;
  state.answerRevealed = false;
  elements.modeBadge.textContent = "读数练习";
  elements.modeBadge.classList.add("quiz");
  elements.controlTip.textContent = "答案已隐藏，请直接读取仪器上的刻度。";
  elements.answerInput.value = "";
  elements.feedbackPanel.hidden = true;
  elements.analysisPanel.hidden = true;
  renderInstrument();
  elements.answerInput.focus({ preventScroll: true });
}

function resetSimulator() {
  state.quizMode = false;
  state.answerRevealed = false;
  elements.modeBadge.textContent = "自由调节";
  elements.modeBadge.classList.remove("quiz");
  elements.controlTip.textContent = "自由调节时，当前读数会实时显示。";
  elements.answerInput.value = "";
  elements.feedbackPanel.hidden = true;
  elements.analysisPanel.hidden = true;
  setValue(0);
}

function showFeedback(correct, message) {
  elements.feedbackPanel.hidden = false;
  elements.feedbackPanel.className = `feedback-panel ${correct ? "correct" : "wrong"}`;
  elements.feedbackIcon.textContent = correct ? "✓" : "×";
  elements.feedbackTitle.textContent = correct ? "回答正确！" : "回答错误";
  elements.feedbackText.textContent = message;
}

function submitAnswer() {
  const raw = elements.answerInput.value.trim();
  const answer = Number(raw);

  if (raw === "" || !Number.isFinite(answer)) {
    showFeedback(false, "请输入 0.000 至 50.000 之间的有效读数。");
    elements.answerInput.focus();
    return;
  }

  if (answer < 0 || answer > 50) {
    showFeedback(false, "读数超出量程，请输入 0.000 至 50.000 mm。");
    elements.answerInput.focus();
    return;
  }

  const answerUnits = Math.round(answer * 1000);
  const correct = Math.abs(answerUnits - state.valueUnits) <= 1;
  state.answerRevealed = true;
  renderReadout();

  if (correct) {
    showFeedback(true, `标准答案为 ${formatUnits(state.valueUnits)} mm，误差在 ±0.001 mm 内。`);
  } else {
    showFeedback(false, `正确答案为 ${formatUnits(state.valueUnits)} mm。`);
  }
}

function showAnalysis() {
  state.answerRevealed = true;
  renderReadout();
  const parts = getReadingParts();

  elements.mainReading.textContent = `${formatUnits(parts.mainUnits)} mm`;
  elements.thimbleReading.textContent = `${formatUnits(parts.thimbleUnits)} mm`;
  elements.totalReading.textContent = `${formatUnits(parts.totalUnits)} mm`;
  elements.formulaText.textContent =
    `${formatUnits(parts.totalUnits)} mm = ${formatUnits(parts.mainUnits)} mm + ${formatUnits(parts.thimbleUnits)} mm`;
  elements.analysisPanel.hidden = false;
  try {
    elements.analysisPanel.scrollIntoView({ behavior: "smooth", block: "nearest" });
  } catch (error) {
    elements.analysisPanel.scrollIntoView();
  }
}

function beginDrag(clientX, pointerId) {
  state.dragging = true;
  state.dragStartX = clientX;
  state.dragStartUnits = state.valueUnits;
  if (pointerId !== undefined && elements.stage.setPointerCapture) {
    elements.stage.setPointerCapture(pointerId);
  }
  elements.stage.classList.add("dragging");
}

function moveDrag(clientX) {
  if (!state.dragging) return;
  const deltaX = clientX - state.dragStartX;
  setValue(state.dragStartUnits + deltaX * DRAG_SENSITIVITY, { userAdjusted: true });
}

function endDrag(pointerId) {
  if (!state.dragging) return;
  state.dragging = false;
  if (
    pointerId !== undefined &&
    elements.stage.hasPointerCapture &&
    elements.stage.hasPointerCapture(pointerId)
  ) {
    elements.stage.releasePointerCapture(pointerId);
  }
  elements.stage.classList.remove("dragging");
}

if (window.PointerEvent) {
  elements.stage.addEventListener("pointerdown", (event) => {
    if (event.button !== undefined && event.button !== 0) return;
    event.preventDefault();
    elements.stage.focus();
    beginDrag(event.clientX, event.pointerId);
  });

  elements.stage.addEventListener("pointermove", (event) => {
    event.preventDefault();
    moveDrag(event.clientX);
  });

  elements.stage.addEventListener("pointerup", (event) => endDrag(event.pointerId));
  elements.stage.addEventListener("pointercancel", (event) => endDrag(event.pointerId));
} else {
  // 兼容不支持 Pointer Events 的旧版 iOS Safari。
  elements.stage.addEventListener("touchstart", (event) => {
    if (!event.touches.length) return;
    event.preventDefault();
    beginDrag(event.touches[0].clientX);
  }, { passive: false });

  elements.stage.addEventListener("touchmove", (event) => {
    if (!event.touches.length) return;
    event.preventDefault();
    moveDrag(event.touches[0].clientX);
  }, { passive: false });

  elements.stage.addEventListener("touchend", () => endDrag());
  elements.stage.addEventListener("touchcancel", () => endDrag());

  elements.stage.addEventListener("mousedown", (event) => {
    if (event.button !== 0) return;
    event.preventDefault();
    beginDrag(event.clientX);
  });
  window.addEventListener("mousemove", (event) => moveDrag(event.clientX));
  window.addEventListener("mouseup", () => endDrag());
}

elements.stage.addEventListener("wheel", (event) => {
  event.preventDefault();
  const direction = event.deltaY > 0 ? -1 : 1;
  setValue(state.valueUnits + direction, { userAdjusted: true });
}, { passive: false });

elements.stage.addEventListener("keydown", (event) => {
  let delta = 0;
  if (event.key === "ArrowLeft") delta = -1;
  if (event.key === "ArrowRight") delta = 1;
  if (event.key === "PageDown") delta = -10;
  if (event.key === "PageUp") delta = 10;
  if (!delta) return;
  event.preventDefault();
  setValue(state.valueUnits + delta, { userAdjusted: true });
});

elements.randomBtn.addEventListener("click", startQuiz);
elements.resetBtn.addEventListener("click", resetSimulator);
elements.submitBtn.addEventListener("click", submitAnswer);
elements.explainBtn.addEventListener("click", showAnalysis);
elements.answerInput.addEventListener("keydown", (event) => {
  if (event.key === "Enter") submitAnswer();
});

renderInstrument();

</script>
</body>
</html>
